aid: dhl
url: https://raw.githubusercontent.com/api-evangelist/dhl/refs/heads/main/apis.yml
name: DHL
description: DHL is a global logistics company that provides a wide range of services, including express delivery, freight
  transportation, supply chain solutions, and e-commerce services. As one of the largest logistics companies in the world,
  DHL operates in over 220 countries and territories, connecting businesses and individuals with seamless and reliable shipping
  solutions. The DHL API Developer Portal exposes APIs across the company's business divisions including DHL eCommerce, DHL
  Express, DHL Global Forwarding, DHL Freight, DHL Supply Chain, and Post and Parcel Germany.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
type: Index
position: Consumer
access: 3rd-Party
tags:
- Freight
- Logistics
- Shipping
- eCommerce
- Tracking
